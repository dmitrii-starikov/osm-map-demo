# Postgres tuning for the demo (baked into the custom image, see Dockerfile).
# Appended to the overv image's config template, so these override its defaults.
#
# These are deliberately modest: the demo's job is to show that tuning is *applied*, not
# to chase performance (the payoff only shows at scale - see README). Aggressive values
# (e.g. shared_buffers=4GB) OOM-kill the import on a memory-constrained machine, so we keep
# things safe to run anywhere. For real workloads scale these up per the rules of thumb
# below; for a planet import on 64 GB:
#   shared_buffers        ~25% of RAM   (planet/64 GB → 15GB)
#   effective_cache_size  ~50–75% of RAM (a hint, not an allocation)
#   maintenance_work_mem   large - speeds up CREATE INDEX / VACUUM (planet → 8GB)
#   work_mem               careful - multiplied by concurrent sorts/hashes
#   max_wal_size           large - fewer checkpoints during bulk import (planet → 10GB)

# Memory (modest - safe alongside other workloads)
shared_buffers          = 256MB
work_mem                = 32MB
maintenance_work_mem    = 256MB
effective_cache_size    = 2GB
hash_mem_multiplier     = 2.0

# WAL / writes
max_wal_size                  = 1GB
min_wal_size                  = 128MB
checkpoint_completion_target  = 0.9

# Parallelism
max_worker_processes            = 4
max_parallel_workers_per_gather = 2
max_parallel_workers            = 4
