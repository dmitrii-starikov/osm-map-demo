; renderd.conf baked into the custom image (docker/Dockerfile COPYs it to /etc/renderd.conf).
; This is the overv image's own renderd.conf plus our [en] layer. Baking it (rather than
; bind-mounting) is what makes a custom renderd.conf work at all: the image's entrypoint
; runs `sed -i` on this file (to set num_threads from THREADS), and a single-file bind mount
; breaks that with "Device or resource busy". As a normal baked file, the sed works fine.

[renderd]
stats_file=/run/renderd/renderd.stats
socketname=/run/renderd/renderd.sock
num_threads=4
tile_dir=/var/cache/renderd/tiles

[mapnik]
plugins_dir=/usr/lib/mapnik/3.1/input
font_dir=/usr/share/fonts
font_dir_recurse=true

; Default layer (native names) served at /tile/, proxied by nginx as /osm/.
[default]
URI=/tile/
TILEDIR=/var/cache/renderd/tiles
XML=/home/renderer/src/openstreetmap-carto/mapnik.xml
HOST=localhost
TILESIZE=256
MAXZOOM=20

; English layer (name:en via the `en` DB views) served at /tile-en/, nginx /osm-en/.
[en]
URI=/tile-en/
TILEDIR=/var/cache/renderd/tiles
XML=/data/style/mapnik-en.xml
HOST=localhost
TILESIZE=256
MAXZOOM=20
