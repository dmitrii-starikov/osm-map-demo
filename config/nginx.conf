server {
    listen 80;
    server_name localhost;

    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy tile requests to the tile-server (container's name).
    # Public path is /osm/ (what Leaflet requests); the image serves tiles at /tile/.
    location /osm/ {
        proxy_pass         http://tile-server:80/tile/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_connect_timeout 10s;
        proxy_read_timeout    90s;
    }

    # On-demand English layer (name:en) baked into the image, views via `make localize`.
    # Served by a second renderd config at /tile-en/; rendered lazily on first view.
    location /osm-en/ {
        proxy_pass         http://tile-server:80/tile-en/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_connect_timeout 10s;
        proxy_read_timeout    90s;
    }

    # renderd status
    location /mod_tile {
        proxy_pass http://tile-server:80/mod_tile;
    }
}
